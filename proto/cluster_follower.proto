syntax = "proto3";

option go_package = "expansion-gateway/clustering/grpc";

package expansion_gateway;

service ExpansionGatewayClusterFollower {
    rpc CheckIfFollowerIsOnline(Empty) returns (FollowerOperationResult);
    rpc RequestAcceptClient(SubscriptionRequestData) returns (RedirectionRequestResult);
    rpc HasSession(FollowerSessionID) returns (FollowerOperationResult);
    rpc DropClient(Empty) returns (FollowerOperationResult);
}

message FollowerSessionID {
    int64 sessionID = 1;
}

message FollowerOperationResult {
    bool success = 1;
}

message SubscriptionRequestData {
    int64 userID = 1;
    int32 clientType = 2;
    int32 clientVersion = 3;
    int32 encryption = 4;
    bool sessionResume = 5;
    int64 reqestedSessionID = 6;
    int32 protocolVersion = 7;
}

message RedirectionRequestResult {
    bool success = 1; // if true, everything ok
    optional SubscriptionRequestResultBody body = 2;
}

message SubscriptionRequestResultBody {
    int64 subscriptionID = 1;
    repeated int32 challenge = 2;
    repeated int32 serverPublicEphemeralKey = 3;
    string newGatewayAddress = 4;
}

message Empty {}